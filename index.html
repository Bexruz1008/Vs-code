<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Vs-code Projects</title>
  <style>
    :root {
      --bg: #0d1117;
      --card: #161b22;
      --text: #e6edf3;
      --muted: #9aa4b2;
      --accent: #2f81f7;
      --border: #30363d;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 32px 16px;
      font-family: Segoe UI, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    p {
      margin: 0 0 20px;
      color: var(--muted);
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 10px;
    }

    a {
      display: block;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      text-decoration: none;
      background: #0f141b;
    }

    a:hover {
      border-color: var(--accent);
    }
  </style>
</head>

<body>
  <main class="wrap">
    <h1>Projects Home</h1>
    <p>Select a project folder. Pages auto-deploy from GitHub Actions.</p>
    <ul>
      <li><a href="./.sass/sinov%20imtihon/">Open: .sass/sinov imtihon</a></li>
      <li><a href="./.sass/">.sass</a></li>
      <li><a href="./Bootstrap/">Bootstrap</a></li>
      <li><a href="./CSS/">CSS</a></li>
      <li><a href="./Excercise/">Excercise</a></li>
      <li><a href="./Html/">Html</a></li>
      <li><a href="./Html%20v2/">Html v2</a></li>
      <li><a href="./JS/">JS</a></li>
      <li><a href="./Loyiha%20saytlar/">Loyiha saytlar</a></li>
    </ul>
  </main>
</body>

</html>
