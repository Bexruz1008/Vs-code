<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yaqinlarim.uz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body data-theme="light">
    <header class="navbar">
        <div class="brand">
            <img src="rasmlar/Frame (9).png" alt="" class="icon">
            <span>Yaqinlarim.uz</span>
        </div>
        <h1>Kontaktlar</h1>
        <button class="theme-toggle" id="themeToggle" type="button" aria-pressed="false">
            <img src="rasmlar/Icons.svg" alt="" class="icon">
            <span id="themeLabel">Tun rejimi</span>
        </button>
    </header>
    
    <main class="page">
        <section class="create">
            <h2>Kontakt yaratish</h2>
            <div class="card create-card">
                <div class="avatar-panel">
                    <img src="rasmlar/Frame 7.png" alt="" class="avatar-big">
                </div>
                <form class="contact-form">
                    <label class="field">
                        <img src="rasmlar/user 1.png" alt="" class="icon">
                        <input type="text" placeholder="Ism" id="fName" required>
                    </label>
                    <label class="field">
                        <img src="rasmlar/second name.png" alt="" class="icon">
                        <input type="text" placeholder="Familiya" id="lName" required>
                    </label>
                    <label class="field">
                        <img src="rasmlar/phone 1.png" alt="" class="icon">
                        <input type="tel" placeholder="Telefon raqam" id="phone" required>
                    </label>
                    <label class="field">
                        <img src="rasmlar/email 3.png" alt="" class="icon">
                        <input type="email" placeholder="Elektron pochta" id="email" required>
                    </label>
                    <label class="field">
                        <img src="rasmlar/Frame 6.png" alt="" class="icon">
                        <input type="text" placeholder="Qo'shimcha ma'lumot" id="note">
                    </label>
                    <button class="add-btn" type="button">
                        <img src="rasmlar/star btn.png" alt="" class="star">
                        <span>Qo'shish</span>
                    </button>
                </form>
            </div>
        </section>
        
        <section class="list">
            <h2>Kontaktlar</h2>
            <div class="card list-card">
                <div class="list-top">
                    <div class="user-row">
                        <span>Xabibullayev Yaxyobek</span>
                        <img src="rasmlar/Frame 13.png" alt="" class="avatar-mini">
                    </div>
                    <div class="search-bar">
                        <img src="rasmlar/second name (1).png" alt="" class="icon">
                        <input type="text" placeholder="Kontakt qidirish" id="searchInput" name="https://www.youtube.com/results?search_query=">
                        <button type="button" id="showAllButton">Barchasi</button>
                    </div>
                </div>
                
                <div class="contacts"></div>
            </div>
        </section>
    </main>
    <script src="app.js"></script>
</body>
</html>
