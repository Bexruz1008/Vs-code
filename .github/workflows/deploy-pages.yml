name: Deploy All Static Projects

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare static bundle
        shell: bash
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site

          # Copy all web folders except tooling and heavy local dependencies.
          rsync -av \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.vscode/' \
            --exclude='node_modules/' \
            --exclude='scripts/' \
            --exclude='.devcontainer/' \
            --exclude='Flutter/' \
            --exclude='*.zip' \
            ./ _site/

          # GitHub's upload-pages-artifact excludes dot-prefixed entries.
          # Mirror ".sass" into "sass" so Pages can serve it.
          if [ -d "_site/.sass" ]; then
            cp -a "_site/.sass" "_site/sass"
          fi

          # Ensure root URL works by generating an index page when missing.
          if [ ! -f "_site/index.html" ]; then
            declare -A LINK_SET=()

            while IFS= read -r index_file; do
              rel="${index_file#_site/}"
              dir="$(dirname "$rel")"
              [ "$dir" = "." ] && continue

              if [[ "$dir" == .sass* ]]; then
                dir="sass${dir#.sass}"
              fi

              LINK_SET["${dir%/}/"]=1
            done < <(
              find _site \
                -type f \
                -iname 'index.html' \
                -not -path '_site/.git/*' \
                -not -path '_site/.github/*' \
                -not -path '_site/.vscode/*' \
                -not -path '_site/node_modules/*' \
                | sort
            )

            {
              echo '<!doctype html>'
              echo '<html lang="en"><head>'
              echo '  <meta charset="utf-8" />'
              echo '  <meta name="viewport" content="width=device-width, initial-scale=1" />'
              echo '  <title>Project Links</title>'
              echo '  <style>'
              echo '    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;margin:2rem;line-height:1.5}'
              echo '    h1{margin:0 0 1rem;font-size:1.5rem}'
              echo '    ul{padding-left:1.2rem}'
              echo '    li{margin:.35rem 0}'
              echo '    a{color:#0b57d0;text-decoration:none}'
              echo '    a:hover{text-decoration:underline}'
              echo '  </style>'
              echo '</head><body>'
              echo '  <h1>Available Projects</h1>'
              echo '  <ul>'

              mapfile -t LINKS < <(printf "%s\n" "${!LINK_SET[@]}" | sort)
              for link in "${LINKS[@]}"; do
                printf '    <li><a href="%s">%s</a></li>\n' "$link" "$link"
              done

              echo '  </ul>'
              echo '</body></html>'
            } > _site/index.html
          fi

          touch _site/.nojekyll

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
