name: Deploy to Vercel (Optional)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-secrets:
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - name: Check Vercel secrets
        id: check
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -n "$VERCEL_TOKEN" ] && [ -n "$VERCEL_ORG_ID" ] && [ -n "$VERCEL_PROJECT_ID" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "Vercel secrets are configured."
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Missing Vercel secrets. Set VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID in GitHub."
          fi

  deploy:
    needs: check-secrets
    if: ${{ needs.check-secrets.outputs.ready == 'true' }}
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull project settings
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy
        id: deploy
        shell: bash
        run: |
          DEPLOY_URL="$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})"
          echo "url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
          echo "Vercel deployment URL: $DEPLOY_URL"

      - name: Summary
        run: |
          echo "### Vercel Deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.deploy.outputs.url }}" >> "$GITHUB_STEP_SUMMARY"

  setup-required:
    needs: check-secrets
    if: ${{ needs.check-secrets.outputs.ready != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Explain missing setup
        run: |
          echo "### Vercel setup required" >> "$GITHUB_STEP_SUMMARY"
          echo "Add repository secrets: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID." >> "$GITHUB_STEP_SUMMARY"
          echo "After adding secrets, push again or run this workflow manually." >> "$GITHUB_STEP_SUMMARY"
