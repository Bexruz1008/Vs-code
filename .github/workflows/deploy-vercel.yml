name: Deploy to Vercel (Optional)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-secrets:
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - name: Check Vercel secrets
        id: check
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -n "$VERCEL_TOKEN" ] && [ -n "$VERCEL_ORG_ID" ] && [ -n "$VERCEL_PROJECT_ID" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "Vercel secrets are configured."
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Missing Vercel secrets. Set VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID in GitHub."
          fi

  deploy:
    needs: check-secrets
    if: ${{ needs.check-secrets.outputs.ready == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Normalize Vercel IDs
        id: ids
        shell: bash
        run: |
          ORG_ID="$(printf '%s' '${{ secrets.VERCEL_ORG_ID }}' | tr -d '\r\n' | xargs)"
          PROJECT_ID="$(printf '%s' '${{ secrets.VERCEL_PROJECT_ID }}' | tr -d '\r\n' | xargs)"

          if [ -z "$ORG_ID" ] || [ -z "$PROJECT_ID" ]; then
            echo "Vercel IDs are empty after normalization."
            exit 1
          fi

          echo "org_id=$ORG_ID" >> "$GITHUB_OUTPUT"
          echo "project_id=$PROJECT_ID" >> "$GITHUB_OUTPUT"

      - name: Pull project settings
        env:
          VERCEL_ORG_ID: ${{ steps.ids.outputs.org_id }}
          VERCEL_PROJECT_ID: ${{ steps.ids.outputs.project_id }}
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy
        id: deploy
        shell: bash
        env:
          VERCEL_ORG_ID: ${{ steps.ids.outputs.org_id }}
          VERCEL_PROJECT_ID: ${{ steps.ids.outputs.project_id }}
        run: |
          DEPLOY_OUTPUT="$(vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }} 2>&1)"
          echo "$DEPLOY_OUTPUT"

          DEPLOY_URL="$(printf "%s\n" "$DEPLOY_OUTPUT" | grep -Eo 'https://[a-zA-Z0-9.-]+\.vercel\.app' | tail -n 1)"
          if [ -z "$DEPLOY_URL" ]; then
            echo "Could not detect Vercel deployment URL from CLI output."
            exit 1
          fi

          echo "url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
          echo "Vercel deployment URL: $DEPLOY_URL"

      - name: Summary
        run: |
          echo "### Vercel Deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.deploy.outputs.url }}" >> "$GITHUB_STEP_SUMMARY"

  setup-required:
    needs: check-secrets
    if: ${{ needs.check-secrets.outputs.ready != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Explain missing setup
        run: |
          echo "### Vercel setup required" >> "$GITHUB_STEP_SUMMARY"
          echo "Add repository secrets: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID." >> "$GITHUB_STEP_SUMMARY"
          echo "After adding secrets, push again or run this workflow manually." >> "$GITHUB_STEP_SUMMARY"
