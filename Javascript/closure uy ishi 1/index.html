<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Homework</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <!-- 1-Vazifa: Parol -->
        <div class="card">
            <h3>1. Parol Tekshirgich</h3>
            <input type="password" id="passInput" placeholder="Parolni kiriting">
            <button id="submitBtn">Tekshirish</button>
            <p id="passResult"></p>
        </div>

        <!-- 2-Vazifa: Ism va Yosh -->
        <div class="card">
            <h3>2. Yosh Kalkulyatori</h3>
            <input type="text" id="userName" placeholder="Ismingiz">
            <input type="number" id="userYear" placeholder="Tug'ilgan yilingiz">
            <button id="calculateBtn">Hisoblash</button>
            <p id="ageResult"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
