<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script defer type="module" src="./app.js"></script>
  </head>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: sans-serif;
      margin: 0;
    }
    .wrapper {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      padding: 20px;
      background-color: #61825f;
    }
    .card {
      display: grid;
      width: 300px;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      background-color: #135029;
      text-align: center;
    }
    .card img {
      width: 100%;
      height: 300px;
      border: none;
    }
    h1 {
      font-size: 26px;
    }
    .card h1,
    .card p {
      padding: 5px 20px;
      color: rgb(212, 175, 55);
      text-shadow: 0 0 10px rgb(72, 112, 69);
    }
    span {
      font-weight: 600;
      color: goldenrod;
    }
  </style>
  <body>
    <section class="wrapper"></section>
  </body>
</html>
