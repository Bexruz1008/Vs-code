<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative Mind Card</title>
    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
</head>
<body>
    <main class="page">
        <article class="post-card">
            <header class="post-header">
                <div class="profile">
                    <div class="avatar" aria-hidden="true"></div>

                    <div class="profile-text">
                        <h1>Creative_Mind</h1>
                        <p>Digital Artist</p>
                    </div>
                </div>

                <button class="follow-btn" type="button" aria-pressed="false">
                    Follow
                </button>
            </header>

            <div class="art" aria-hidden="true">
                <span class="shape shape-glow"></span>
                <span class="shape shape-light"></span>
                <span class="shape shape-pink"></span>
                <span class="shape shape-violet"></span>
                <span class="shape shape-blue"></span>
                <span class="shape shape-deep"></span>
            </div>

            <div class="post-body">
                <div class="actions">
                    <button class="icon-btn like-btn" type="button" aria-label="Like post" aria-pressed="false">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M12 21s-7-4.35-9.5-8.48C-.58 7.39 2.08 3 6.5 3c2.38 0 4.1 1.3 5.5 3.02C13.4 4.3 15.12 3 17.5 3 21.92 3 24.58 7.39 21.5 12.52 19 16.65 12 21 12 21Z" />
                        </svg>
                    </button>

                    <span class="likes-count">1,240</span>

                    <button class="icon-btn" type="button" aria-label="Comment on post">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M12 4c4.97 0 9 3.58 9 8s-4.03 8-9 8c-1.12 0-2.2-.18-3.2-.52L4 21l1.86-3.72C4.08 15.87 3 14.01 3 12c0-4.42 4.03-8 9-8Z" />
                        </svg>
                    </button>

                    <button class="icon-btn" type="button" aria-label="Share post">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="m21.5 2.5-8.4 19-3.15-7.95L2 10.4l19.5-7.9Z" />
                        </svg>
                    </button>
                </div>

                <p class="caption">
                    Exploring the intersection of <strong>#AbstractArt</strong> and
                    <strong>#UXDesign</strong>. What do you think of this palette?
                    <span aria-hidden="true">🎨</span>
                </p>
            </div>
        </article>

    </main>
</body>
</html>
