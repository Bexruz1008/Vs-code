<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Document</title>
    <script src="script.js" defer></script>

    <style>
        * , html{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: color 0.1s ease;
        }
        body{
            display: grid;
            place-items: center;
            height: 100dvh;
            background-color: rgb(175, 73, 73);
        }
        .timer {
            display: grid;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 500px;
            width: 500px;
            background-color: rgb(183, 92, 92);
            border-radius: 28px;
            box-shadow: 0 0 30px 20px rgba(255, 255, 255, 0.26);
            color: white;
        }
        h1 {
            font-size: 50px;
            text-align: center;
            margin-top: 10%;
            font-family: sans-serif;
        }
        
        #display {
            font-size: 80px;
            text-align: center;
            font-family: monospace;
            font-weight: 800;
            text-shadow: 0 0 8px white;
        }
        button {
            font-size: 20px;
            padding: 15px 30px;
            margin: 10px;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            color: white;
        }
        button:active{
            filter: blur(2px);
            box-shadow: 0 0 10px black;
        }
        .startBtn{
            background-color: green;
        }
        .startBtn:hover{
            background-color: rgba(0, 128, 0, 0.5);
            transition: background 0.1s ease;
        }

        .stopBtn{
            background-color: red;
        }
        .stopBtn:hover{
            background-color: rgba(220, 68, 68, 0.405);
            transition: background 0.1s ease;
        }

        .resetBtn{
            background-color: blue;
        }
        .resetBtn:hover{
            background-color: rgba(0, 0, 255, 0.5);
            transition: background 0.1s ease;
        }

    </style>
</head>

<body>
    <section class="timer">
        <h1>Anti 🧃 timer</h1>
        <p id="display">25:00</p>
        <div>
            <button id="startBtn" class="startBtn">Start</button>
            <button id="stopBtn" class="stopBtn">Stop</button>
            <button id="resetBtn" class="resetBtn">Reset</button>
        </div>
    </section>
</body>

</html>
