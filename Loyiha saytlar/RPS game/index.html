<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0F172A" />
  <title>Rock Paper Scissors</title>

  <!-- Telegram Mini Apps SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- Google Fonts: Orbitron for display, Inter for body -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Confetti canvas overlay -->
  <canvas id="confetti-canvas"></canvas>

  <!-- Reset confirmation modal -->
  <div id="reset-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title" hidden>
    <div class="modal-card">
      <p id="modal-title" class="modal-title">Reset the game?</p>
      <p class="modal-sub">All scores and streaks will be cleared.</p>
      <div class="modal-actions">
        <button id="btn-cancel-reset" class="modal-btn modal-btn--cancel">Cancel</button>
        <button id="btn-confirm-reset" class="modal-btn modal-btn--confirm">Reset</button>
      </div>
    </div>
  </div>

  <div id="app">

    <!-- ── Header ── -->
    <header class="header">
      <div class="header-inner">
        <h1 class="game-title">
          <span class="title-rps">RPS</span>
          <span class="title-sub">BATTLE</span>
        </h1>
        <button id="btn-sound" class="icon-btn" aria-label="Toggle sound" title="Toggle sound">
          <span id="sound-icon">🔊</span>
        </button>
      </div>
    </header>

    <!-- ── Avatars & Scoreboard ── -->
    <section class="scoreboard-section">
      <div class="player-card player-card--user">
        <div class="avatar-wrap" id="player-avatar-wrap">
          <img id="player-avatar" class="avatar" src="" alt="Your avatar" hidden />
          <div id="player-avatar-fallback" class="avatar avatar--fallback">
            <span id="player-initials">?</span>
          </div>
        </div>
        <span class="player-name" id="player-name">You</span>
      </div>

      <div class="scoreboard">
        <div class="score-block">
          <span class="score-value score-value--win" id="score-player">0</span>
          <span class="score-label">WIN</span>
        </div>
        <div class="score-divider">
          <span class="score-value score-value--draw" id="score-draws">0</span>
          <span class="score-label">DRAW</span>
        </div>
        <div class="score-block">
          <span class="score-value score-value--lose" id="score-computer">0</span>
          <span class="score-label">LOSS</span>
        </div>
      </div>

      <div class="player-card player-card--computer">
        <div class="avatar-wrap">
          <div class="avatar avatar--cpu">🤖</div>
        </div>
        <span class="player-name">CPU</span>
      </div>
    </section>

    <!-- ── Streak bar ── -->
    <div class="streak-bar">
      <div class="streak-item">
        <span class="streak-icon">🔥</span>
        <span class="streak-label">Streak</span>
        <span class="streak-value" id="streak-current">0</span>
      </div>
      <div class="streak-divider"></div>
      <div class="streak-item">
        <span class="streak-icon">⚡</span>
        <span class="streak-label">Best</span>
        <span class="streak-value" id="streak-best">0</span>
      </div>
    </div>

    <!-- ── Battle Arena ── -->
    <section class="arena">
      <div class="arena-side arena-side--player">
        <div class="choice-display" id="choice-player">
          <span class="choice-emoji" id="choice-emoji-player">❓</span>
        </div>
        <span class="choice-label">Your pick</span>
      </div>

      <div class="arena-center">
        <span class="vs-text">VS</span>
      </div>

      <div class="arena-side arena-side--cpu">
        <div class="choice-display" id="choice-cpu">
          <span class="choice-emoji" id="choice-emoji-cpu">❓</span>
        </div>
        <span class="choice-label">CPU pick</span>
      </div>
    </section>

    <!-- ── Result Banner ── -->
    <div class="result-banner" id="result-banner" aria-live="polite">
      <p class="result-text" id="result-text">Choose your weapon!</p>
      <p class="result-msg" id="result-msg">Tap a button to begin</p>
    </div>

    <!-- ── Choice Buttons ── -->
    <section class="choices">
      <button class="choice-btn" id="btn-rock" data-choice="rock" aria-label="Rock">
        <span class="choice-btn__emoji">🪨</span>
        <span class="choice-btn__label">Rock</span>
      </button>
      <button class="choice-btn" id="btn-paper" data-choice="paper" aria-label="Paper">
        <span class="choice-btn__emoji">📄</span>
        <span class="choice-btn__label">Paper</span>
      </button>
      <button class="choice-btn" id="btn-scissors" data-choice="scissors" aria-label="Scissors">
        <span class="choice-btn__emoji">✂️</span>
        <span class="choice-btn__label">Scissors</span>
      </button>
    </section>

    <!-- ── Footer Actions ── -->
    <footer class="footer">
      <button id="btn-reset" class="action-btn action-btn--ghost">
        ↺ Reset Game
      </button>
    </footer>

  </div><!-- /#app -->

  <script src="app.js"></script>
</body>
</html>
